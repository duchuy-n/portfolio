<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Preview - Nguyen Duc Huy</title>
    <style>
        :root {
            --bg-a: #0f172a; --accent-a: #06b6d4; --text-a: #94a3b8;
            --bg-b: #121212; --accent-b: #10b981; --text-b: #f3f4f6;
            --bg-c: #050505; --accent-c: #a855f7; --accent-c2: #06b6d4; --text-c: #e5e7eb;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; gap: 40px; padding: 40px; background: #f0f0f0; }
        .palette { display: flex; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); height: 400px; position: relative; }
        .info { position: absolute; top: 20px; left: 20px; z-index: 10; padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .info h2 { margin: 0 0 10px 0; }
        .color-track { display: flex; flex: 1; }
        .block { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20px; color: white; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .b { background: var(--bg-b); }
        .b .accent { background: var(--accent-b); flex: 2; width: 100%; display: flex; align-items: center; justify-content: center; font-size: 2em; color: var(--bg-b); }
        .b .surface { background: #1e1e1e; flex: 1; width: 100%; }
        
        .c { background: var(--bg-c); }
        .c .accent { background: linear-gradient(135deg, var(--accent-c), var(--accent-c2)); flex: 2; width: 100%; display: flex; align-items: center; justify-content: center; font-size: 2em; color: white; }
        .c .surface { background: #111111; border-top: 2px solid var(--accent-c); flex: 1; width: 100%; }

        .btn { padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-b { background: var(--accent-b); color: var(--bg-b); }
        .btn-c { background: var(--accent-c); color: white; box-shadow: 0 0 15px var(--accent-c); }
    </style>
</head>
<body>

    <div class="palette">
        <div class="info">
            <h2>Phương án B: Emerald & Dark Gray</h2>
            <p>Phong cách chuyên nghiệp, hiện đại, bền bỉ.</p>
            <button class="btn btn-b">Chọn màu này</button>
        </div>
        <div class="color-track b">
            <div class="block">Background (#121212)</div>
            <div class="accent">Emerald (#10B981)</div>
            <div class="surface">Surface (#1E1E1E)</div>
        </div>
    </div>

    <div class="palette">
        <div class="info">
            <h2>Phương án C: Cyberpunk Purple</h2>
            <p>Phong cách bứt phá, tương lai, nghệ sĩ.</p>
            <button class="btn btn-c">Chọn màu này</button>
        </div>
        <div class="color-track c">
            <div class="block">Background (#050505)</div>
            <div class="accent">Cyber Purple (#A855F7)</div>
            <div class="surface">Surface (#111111)</div>
        </div>
    </div>

</body>
</html>
